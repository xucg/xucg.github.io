baseURL = '/'
# GitHub Actions 部署时通过 --baseURL 参数覆盖为实际域名
# Cloudflare Pages 同理，构建时自动注入
# 本地预览时 baseURL 为 '/' 确保链接不跳转到其他域名
locale = 'zh-cn'
defaultContentLanguage = 'zh'
title = '老徐数学博客'
theme = 'PaperMod'

# canonifyURLs 保持关闭，避免 Hugo 将相对路径重写为绝对路径
canonifyURLs = false

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[params]
  env = 'production'
  title = '老徐数学博客'
  description = '数学研究、几何演示与教学笔记'
  author = 'Me'
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  math = true

[params.homeInfoParams]
  Title = '老徐数学博客'
  Content = '记录数学教学思考、GeoGebra 学习与研究。'

[[menu.main]]
  identifier = 'posts'
  name = '文章'
  url = '/posts/'
  weight = 10

[[menu.main]]
  identifier = 'archives'
  name = '归档'
  url = '/archives/'
  weight = 20

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    
  