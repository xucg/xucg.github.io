baseURL = 'https://xucg.github.io/'
locale = 'zh-cn'
defaultContentLanguage = 'zh'
title = '数学与几何博客'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[params]
  env = 'production'
  title = '数学与几何博客'
  description = '数学公式、几何演示与教学笔记'
  author = 'Me'
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  math = true

[params.homeInfoParams]
  Title = '数学与几何博客'
  Content = '记录数学公式、GeoGebra 演示与教学思考。'

[[menu.main]]
  identifier = 'posts'
  name = '文章'
  url = '/posts/'
  weight = 10

[[menu.main]]
  identifier = 'archives'
  name = '归档'
  url = '/archives/'
  weight = 20

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
  [markup.highlight]
    noClasses = false
